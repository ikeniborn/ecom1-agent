id: sql-015
phase: sql_plan
content: 'For COUNT queries on `products` or `product_properties`, the SELECT plan MUST include
  a secondary query that returns at least one `products.name` value — so the answer
  phase has product name data available. A COUNT query without an accompanying name-returning
  query is forbidden.'
created: '2026-05-17'
source: eval
eval_score: 8.5
verified: true
raw_recommendation: 'count-answer-message-format: COUNT message MUST contain products.name value'
